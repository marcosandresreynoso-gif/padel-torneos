// ---------- Utilidades de bracket (mismo algoritmo de seeding) ----------
function proximaPotenciaDeDos(n) {
  let p = 1;
  while (p < n) p *= 2;
  return p;
}

function nombreRonda(numParejasEnRonda) {
  switch (numParejasEnRonda) {
    case 2: return 'Final';
    case 4: return 'Semifinal';
    case 8: return 'Cuartos de Final';
    case 16: return 'Octavos de Final';
    case 32: return 'Dieciseisavos de Final';
    default: return `Ronda previa (${numParejasEnRonda})`;
  }
}

function seedOrder(size) {
  if (size === 1) return [0];
  if (size === 2) return [0, 1];
  let prev = [0, 1];
  let n = 2;
  while (n < size) {
    const next = [];
    const total = n * 2;
    for (const p of prev) {
      next.push(p);
      next.push(total - 1 - p);
    }
    prev = next;
    n = total;
  }
  return prev;
}

function shuffle(arr) {
  const copia = [...arr];
  for (let i = copia.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copia[i], copia[j]] = [copia[j], copia[i]];
  }
  return copia;
}

function generarCuadro(parejas) {
  const n = parejas.length;
  if (n < 2) return [];
  const size = proximaPotenciaDeDos(n);
  const byes = size - n;
  const slots = new Array(size).fill(null);
  let idxPareja = 0;
  const orden = seedOrder(size);
  for (let i = 0; i < size; i++) {
    const pos = orden[i];
    if (i < byes) slots[pos] = null;
    else slots[pos] = parejas[idxPareja++];
  }

  const rondas = [];
  let actual = slots;
  let rondaNum = 0;
  while (actual.length >= 2) {
    const partidos = [];
    for (let i = 0; i < actual.length; i += 2) {
      const a = actual[i];
      const b = actual[i + 1];
      let ganadorAuto = null;
      if (a && !b) ganadorAuto = a;
      if (b && !a) ganadorAuto = b;
      partidos.push({
        id: `r${rondaNum}-p${i / 2}`,
        parejaA: a,
        parejaB: b,
        ganador: ganadorAuto,
        horario: '',
        cancha: '',
        marcador: '',
      });
    }
    rondas.push({ nombre: nombreRonda(actual.length), partidos });
    actual = partidos.map(p => p.ganador);
    rondaNum++;
  }
  return rondas;
}

function propagarGanadores(rondas) {
  const nuevasRondas = rondas.map(r => ({ ...r, partidos: r.partidos.map(p => ({ ...p })) }));
  for (let i = 0; i < nuevasRondas.length - 1; i++) {
    const actual = nuevasRondas[i].partidos;
    const siguiente = nuevasRondas[i + 1].partidos;
    for (let j = 0; j < siguiente.length; j++) {
      const a = actual[2 * j]?.ganador || null;
      const b = actual[2 * j + 1]?.ganador || null;
      siguiente[j].parejaA = a;
      siguiente[j].parejaB = b;
      const idA = a ? a.id : null;
      const idB = b ? b.id : null;
      const ganadorId = siguiente[j].ganador ? siguiente[j].ganador.id : null;
      const sigueValido = (ganadorId === idA && a) || (ganadorId === idB && b);
      if (!sigueValido) {
        if (a && !b) siguiente[j].ganador = a;
        else if (b && !a) siguiente[j].ganador = b;
        else siguiente[j].ganador = null;
        siguiente[j].marcador = '';
      }
    }
  }
  return nuevasRondas;
}

// ---------- Fase de grupos (round-robin parcial: 2 partidos por pareja) ----------
function generarGrupos(parejas) {
  const n = parejas.length;
  if (n % 4 !== 0 || n < 4) {
    return { error: `La fase de grupos necesita una cantidad de parejas múltiplo de 4. Hay ${n} inscriptas.` };
  }
  const mezcladas = shuffle(parejas);
  const grupos = [];
  for (let i = 0; i < mezcladas.length; i += 4) {
    const [a, b, c, d] = mezcladas.slice(i, i + 4);
    // Cruces fijos: A-B, C-D (ronda 1) y A-C, B-D (ronda 2). A-D y B-C no se juegan.
    grupos.push({
      id: `grupo-${i / 4}`,
      nombre: `Grupo ${String.fromCharCode(65 + i / 4)}`,
      integrantes: [a, b, c, d],
      partidos: [
        { id: `g${i / 4}-p0`, parejaA: a, parejaB: b, horario: '', cancha: '', sets: [{ a: '', b: '' }, { a: '', b: '' }, { a: '', b: '' }] },
        { id: `g${i / 4}-p1`, parejaA: c, parejaB: d, horario: '', cancha: '', sets: [{ a: '', b: '' }, { a: '', b: '' }, { a: '', b: '' }] },
        { id: `g${i / 4}-p2`, parejaA: a, parejaB: c, horario: '', cancha: '', sets: [{ a: '', b: '' }, { a: '', b: '' }, { a: '', b: '' }] },
        { id: `g${i / 4}-p3`, parejaA: b, parejaB: d, horario: '', cancha: '', sets: [{ a: '', b: '' }, { a: '', b: '' }, { a: '', b: '' }] },
      ],
    });
  }
  return { grupos };
}

// Calcula la tabla de posiciones de un grupo a partir de sus partidos jugados
// Calcula quién ganó un partido a partir de sus sets: [{a,b}, {a,b}, {a,b}] (tercero opcional)
// Devuelve { setsA, setsB, ganador: 'A'|'B'|null }
function calcularResultadoSets(sets) {
  const jugados = (sets || []).filter(s => s && s.a != null && s.b != null && s.a !== '' && s.b !== '');
  if (jugados.length === 0) return { setsA: 0, setsB: 0, ganador: null, jugados: 0 };
  let setsA = 0, setsB = 0;
  jugados.forEach(s => {
    const a = Number(s.a), b = Number(s.b);
    if (a > b) setsA++;
    else if (b > a) setsB++;
  });
  let ganador = null;
  if (setsA > setsB) ganador = 'A';
  else if (setsB > setsA) ganador = 'B';
  return { setsA, setsB, ganador, jugados: jugados.length };
}

function calcularTablaGrupo(grupo) {
  const stats = {};
  grupo.integrantes.forEach(p => {
    stats[p.id] = { pareja: p, victorias: 0, setsGanados: 0, setsPerdidos: 0, jugados: 0 };
  });
  grupo.partidos.forEach(partido => {
    const { parejaA, parejaB, sets } = partido;
    if (!parejaA || !parejaB) return;
    const { setsA, setsB, ganador, jugados } = calcularResultadoSets(sets);
    if (jugados === 0 || !ganador) return;
    stats[parejaA.id].jugados++;
    stats[parejaB.id].jugados++;
    stats[parejaA.id].setsGanados += setsA;
    stats[parejaA.id].setsPerdidos += setsB;
    stats[parejaB.id].setsGanados += setsB;
    stats[parejaB.id].setsPerdidos += setsA;
    if (ganador === 'A') stats[parejaA.id].victorias++;
    else stats[parejaB.id].victorias++;
  });
  const tabla = Object.values(stats).map(s => ({
    ...s,
    diferencia: s.setsGanados - s.setsPerdidos,
  }));
  tabla.sort((x, y) => {
    if (y.victorias !== x.victorias) return y.victorias - x.victorias;
    if (y.diferencia !== x.diferencia) return y.diferencia - x.diferencia;
    return y.setsGanados - x.setsGanados;
  });
  return tabla;
}

function grupoCompleto(grupo) {
  return grupo.partidos.every(p => calcularResultadoSets(p.sets).ganador != null);
}

// Arma el cuadro eliminatorio a partir de los clasificados (1° y 2° de cada grupo)
function generarCuadroDesdeGrupos(grupos) {
  const clasificados = [];
  grupos.forEach(grupo => {
    const tabla = calcularTablaGrupo(grupo);
    if (tabla[0]) clasificados.push(tabla[0].pareja);
    if (tabla[1]) clasificados.push(tabla[1].pareja);
  });
  // Mezclamos pero evitando que dos clasificados del mismo grupo se enfrenten en la primera ronda si es posible
  const primeros = [];
  const segundos = [];
  grupos.forEach(grupo => {
    const tabla = calcularTablaGrupo(grupo);
    if (tabla[0]) primeros.push(tabla[0].pareja);
    if (tabla[1]) segundos.push(tabla[1].pareja);
  });
  const primerosOrden = shuffle(primeros);
  const segundosOrden = shuffle(segundos);
  const ordenFinal = [];
  for (let i = 0; i < primerosOrden.length; i++) {
    ordenFinal.push(primerosOrden[i]);
    // Emparejamos cada primero con un segundo de otro grupo cuando sea posible
    const segundoDeOtroGrupo = segundosOrden.find(s => {
      const grupoDelPrimero = grupos.find(g => g.integrantes.some(int => int.id === primerosOrden[i].id));
      return !grupoDelPrimero.integrantes.some(int => int.id === s.id);
    });
    if (segundoDeOtroGrupo) {
      ordenFinal.push(segundoDeOtroGrupo);
      segundosOrden.splice(segundosOrden.indexOf(segundoDeOtroGrupo), 1);
    } else if (segundosOrden.length) {
      ordenFinal.push(segundosOrden.shift());
    }
  }
  while (segundosOrden.length) ordenFinal.push(segundosOrden.shift());
  return generarCuadro(ordenFinal);
}


function descargarPdfCuadro(categoria, cuadro) {
  if (!window.jspdf) {
    alert('No se pudo cargar el generador de PDF. Probá de nuevo en unos segundos.');
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const pageWidth = doc.internal.pageSize.getWidth();
  const marginX = 15;
  let y = 18;

  const fecha = new Date().toLocaleDateString('es-AR');

  function encabezado() {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.text('CUADRO DE PADEL', marginX, y);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'normal');
    doc.text(`Categoría: ${categoria}`, marginX, y + 7);
    doc.text(`Fecha: ${fecha}`, pageWidth - marginX, y + 7, { align: 'right' });
    y += 14;
    doc.setDrawColor(180);
    doc.line(marginX, y, pageWidth - marginX, y);
    y += 8;
  }

  function asegurarEspacio(alturaNecesaria) {
    const pageHeight = doc.internal.pageSize.getHeight();
    if (y + alturaNecesaria > pageHeight - 15) {
      doc.addPage();
      y = 18;
    }
  }

  encabezado();

  cuadro.forEach((ronda) => {
    asegurarEspacio(14);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12);
    doc.setTextColor(20, 60, 30);
    doc.text(ronda.nombre.toUpperCase(), marginX, y);
    doc.setTextColor(0, 0, 0);
    y += 7;

    ronda.partidos.forEach((partido, idx) => {
      asegurarEspacio(16);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);

      const nombreA = partido.parejaA ? nombrePareja(partido.parejaA) : '— por definir —';
      const nombreB = partido.parejaB ? nombrePareja(partido.parejaB) : '— por definir —';
      const esGanadorA = partido.ganador && partido.parejaA && partido.ganador.id === partido.parejaA.id;
      const esGanadorB = partido.ganador && partido.parejaB && partido.ganador.id === partido.parejaB.id;

      let infoLinea = `Partido ${idx + 1}`;
      if (partido.horario) infoLinea += `  ·  Horario: ${partido.horario}`;
      if (partido.cancha) infoLinea += `  ·  Cancha: ${partido.cancha}`;
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(9);
      doc.setTextColor(100);
      doc.text(infoLinea, marginX, y);
      doc.setTextColor(0, 0, 0);
      y += 5.5;

      doc.setFont('helvetica', esGanadorA ? 'bold' : 'normal');
      doc.setFontSize(10.5);
      doc.text(`${nombreA}`, marginX + 2, y);
      y += 5.5;
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8.5);
      doc.setTextColor(140);
      doc.text('vs', marginX + 2, y);
      doc.setTextColor(0, 0, 0);
      y += 5.5;
      doc.setFont('helvetica', esGanadorB ? 'bold' : 'normal');
      doc.setFontSize(10.5);
      doc.text(`${nombreB}`, marginX + 2, y);
      y += 5;

      if (partido.marcador) {
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(9);
        doc.setTextColor(60, 110, 60);
        doc.text(`Resultado: ${partido.marcador}`, marginX + 2, y);
        doc.setTextColor(0, 0, 0);
        y += 5;
      }
      y += 3;
      doc.setDrawColor(225);
      doc.line(marginX, y - 1, pageWidth - marginX, y - 1);
    });
    y += 4;
  });

  doc.save(`cuadro-${categoria}-${fecha.replace(/\//g, '-')}.pdf`);
}

function descargarPdfParticipantes(categoria, parejas) {
  if (!window.jspdf) {
    alert('No se pudo cargar el generador de PDF. Probá de nuevo en unos segundos.');
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const pageWidth = doc.internal.pageSize.getWidth();
  const marginX = 15;
  const tableRight = pageWidth - marginX;
  let y = 18;
  const fecha = new Date().toLocaleDateString('es-AR');

  // Columnas: # | Pareja | Horario | Cancha
  const colNum = marginX;
  const colPareja = marginX + 10;
  const colHorario = pageWidth - marginX - 55;
  const colCancha = pageWidth - marginX - 28;

  function dibujarEncabezado() {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.text('LISTA DE INSCRIPTOS', marginX, y);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'normal');
    doc.text(`Categoría: ${categoria}`, marginX, y + 7);
    doc.text(`Fecha: ${fecha}`, pageWidth - marginX, y + 7, { align: 'right' });
    y += 14;
    doc.setDrawColor(180);
    doc.line(marginX, y, tableRight, y);
    y += 9;

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.text('#', colNum, y);
    doc.text('Pareja', colPareja, y);
    doc.text('Horario', colHorario, y);
    doc.text('Cancha', colCancha, y);
    y += 2;
    doc.setDrawColor(120);
    doc.line(marginX, y, tableRight, y);
    // líneas verticales separando columnas
    doc.setDrawColor(200);
    doc.line(colHorario - 4, y, colHorario - 4, y);
    y += 6;
  }

  dibujarEncabezado();

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  parejas.forEach((p, idx) => {
    const pageHeight = doc.internal.pageSize.getHeight();
    if (y > pageHeight - 20) {
      doc.addPage();
      y = 18;
      dibujarEncabezado();
    }
    const nombre = p.nombre1 + (p.nombre2 ? ` / ${p.nombre2}` : '');
    const filaAlto = 8;

    doc.setFont('helvetica', 'normal');
    doc.text(String(idx + 1), colNum, y);
    doc.text(nombre, colPareja, y);
    if (p.horario) doc.text(p.horario, colHorario, y);

    // Espacio en blanco para anotar cancha(s) a mano, con línea para escribir
    doc.setDrawColor(170);
    doc.line(colCancha, y + 1.5, tableRight, y + 1.5);

    // línea divisoria horizontal entre filas
    doc.setDrawColor(225);
    doc.line(marginX, y + filaAlto - 4.5, tableRight, y + filaAlto - 4.5);

    y += filaAlto;
  });

  // líneas verticales que separan las columnas en toda la tabla (se dibujan al final, una vez conocido el alto real de la última página)
  doc.setDrawColor(200);
  doc.line(colHorario - 4, 18 + 14 + 9 - 6, colHorario - 4, y);
  doc.line(colCancha - 4, 18 + 14 + 9 - 6, colCancha - 4, y);

  doc.setFontSize(8.5);
  doc.setTextColor(130);
  doc.text('Cancha: espacio para anotar a mano (una pareja puede tener más de una cancha asignada si juega varios partidos).', marginX, y + 6);

  doc.save(`inscriptos-${categoria}-${fecha.replace(/\//g, '-')}.pdf`);
}

  y += 14;
  doc.setDrawColor(180);
  doc.line(marginX, y, pageWidth - marginX, y);

  grupos.forEach((grupo) => {

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12);
    doc.setTextColor(20, 60, 30);
    doc.text(grupo.nombre.toUpperCase(), marginX, y);
    doc.setTextColor(0, 0, 0);
    y += 7;

    grupo.partidos.forEach((partido, idx) => {
      asegurarEspacio(14);
      const nombreA = nombrePareja(partido.parejaA);
      const nombreB = nombrePareja(partido.parejaB);
      let infoLinea = `Partido ${idx + 1}`;
      if (partido.horario) infoLinea += `  ·  Horario: ${partido.horario}`;
      if (partido.cancha) infoLinea += `  ·  Cancha: ${partido.cancha}`;
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(9);
      doc.setTextColor(100);
      doc.text(infoLinea, marginX, y);
      doc.setTextColor(0, 0, 0);
      y += 5.5;
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10.5);
      doc.text(nombreA, marginX + 2, y);
      y += 5.5;
      doc.setFontSize(8.5);
      doc.setTextColor(140);
      doc.text('vs', marginX + 2, y);
      doc.setTextColor(0, 0, 0);
      y += 5.5;
      doc.setFontSize(10.5);
      doc.text(nombreB, marginX + 2, y);
      y += 5;
      const resultadoSets = calcularResultadoSets(partido.sets);
      if (resultadoSets.jugados > 0) {
        const textoSets = (partido.sets || []).filter(s => s && s.a !== '' && s.b !== '' && s.a != null && s.b != null).map(s => `${s.a}-${s.b}`).join('  /  ');
        doc.setFontSize(9);
        doc.setTextColor(60, 110, 60);
        doc.text(`Resultado: ${textoSets}`, marginX + 2, y);
        doc.setTextColor(0, 0, 0);
        y += 5;
      }
      y += 2;
      doc.setDrawColor(225);
      doc.line(marginX, y - 1, pageWidth - marginX, y - 1);
      y += 1;
    });
    y += 5;
  });

  doc.save(`grupos-${categoria}-${fecha.replace(/\//g, '-')}.pdf`);
}

function nombrePareja(p) {
  if (!p) return null;
  return p.nombre1 + (p.nombre2 ? ` / ${p.nombre2}` : '');
}

// ---------- API helpers ----------
async function apiGet(url) {
  const r = await fetch(API + url);
  if (!r.ok) throw new Error('Error de red');
  return r.json();
}
async function apiPost(url, body) {
  const r = await fetch(API + url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!r.ok) throw new Error('Error de red');
  return r.json();
}
async function apiPut(url, body) {
  const r = await fetch(API + url, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!r.ok) throw new Error('Error de red');
  return r.json();
}
async function apiDelete(url) {
  const r = await fetch(API + url, { method: 'DELETE' });
  if (!r.ok) throw new Error('Error de red');
  return r.json();
}

function TorneoPadel() {
  const [parejasPorCategoria, setParejasPorCategoria] = useState(null);
  const [cuadrosCache, setCuadrosCache] = useState({});
  const [categoriaActiva, setCategoriaActiva] = useState('4ta');
  const [vista, setVista] = useState('participantes');
  const [cargando, setCargando] = useState(true);
  const [errorConexion, setErrorConexion] = useState(false);
  const [modalAscenso, setModalAscenso] = useState(null);
  const [toast, setToast] = useState(null);
  const [cantidadCanchas, setCantidadCanchas] = useState(1);
  const [modalConfig, setModalConfig] = useState(false);

  const [jugador1, setJugador1] = useState('');
  const [jugador2, setJugador2] = useState('');
  const [horarioPref, setHorarioPref] = useState('');

  const mostrarToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  const cargarParejas = useCallback(async () => {
    try {
      const data = await apiGet('/parejas');
      setParejasPorCategoria(data);
      setErrorConexion(false);
    } catch (e) {
      setErrorConexion(true);
    }
  }, []);

  const cargarConfig = useCallback(async () => {
    try {
      const data = await apiGet('/config');
      setCantidadCanchas(data.cantidadCanchas || 1);
    } catch (e) { /* si falla, queda el valor por defecto */ }
  }, []);

  async function guardarCantidadCanchas(n) {
    try {
      const data = await apiPut('/config', { cantidadCanchas: n });
      setCantidadCanchas(data.cantidadCanchas);
      mostrarToast(`Configurado: ${data.cantidadCanchas} cancha(s)`);
    } catch (e) { mostrarToast('No se pudo guardar la configuración.'); }
  }

  const cargarCuadro = useCallback(async (categoria) => {
    try {
      const data = await apiGet(`/cuadros/${categoria}`);
      // Compatibilidad: data.rondas = formato viejo (eliminación directa sin grupos)
      // data.tipo === 'grupos' = nuevo formato con fase de grupos
      if (data.tipo === 'grupos') {
        setCuadrosCache(prev => ({ ...prev, [categoria]: { tipo: 'grupos', grupos: data.grupos || [], cuadroFinal: data.cuadroFinal || [] } }));
      } else {
        setCuadrosCache(prev => ({ ...prev, [categoria]: { tipo: 'eliminacion', rondas: data.rondas || [] } }));
      }
    } catch (e) {
      setErrorConexion(true);
    }
  }, []);

  useEffect(() => {
    (async () => {
      setCargando(true);
      await cargarParejas();
      await cargarCuadro(categoriaActiva);
      await cargarConfig();
      setCargando(false);
    })();
  }, []);

  useEffect(() => {
    if (!cargando) cargarCuadro(categoriaActiva);
  }, [categoriaActiva]);

  if (cargando || !parejasPorCategoria) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-[#0F1A14]">
        <div className="flex items-center gap-2 text-[#E8E2D4] font-mono text-sm tracking-widest">
          <Loader2 className="animate-spin" size={16} /> CARGANDO TORNEO...
        </div>
      </div>
    );
  }

  const parejas = parejasPorCategoria[categoriaActiva] || [];
  const dataCategoria = cuadrosCache[categoriaActiva] || { tipo: 'eliminacion', rondas: [] };
  const esGrupos = dataCategoria.tipo === 'grupos';
  const cuadro = esGrupos ? (dataCategoria.cuadroFinal || []) : (dataCategoria.rondas || []);
  const grupos = esGrupos ? (dataCategoria.grupos || []) : [];

  async function agregarPareja() {
    if (!jugador1.trim()) { mostrarToast('Falta el nombre del jugador/a 1'); return; }
    try {
      await apiPost('/parejas', { categoria: categoriaActiva, nombre1: jugador1, nombre2: jugador2, horario: horarioPref });
      setJugador1(''); setJugador2(''); setHorarioPref('');
      await cargarParejas();
      mostrarToast('Pareja agregada');
    } catch (e) { mostrarToast('No se pudo guardar. Revisá la conexión.'); }
  }

  async function eliminarPareja(id) {
    try {
      await apiDelete(`/parejas/${id}`);
      await cargarParejas();
    } catch (e) { mostrarToast('No se pudo eliminar.'); }
  }

  async function sortearCuadro() {
    if (parejas.length < 2) { mostrarToast('Necesitás al menos 2 parejas para sortear'); return; }
    const mezcladas = shuffle(parejas);
    const nuevasRondas = generarCuadro(mezcladas);
    const payload = { tipo: 'eliminacion', rondas: nuevasRondas };
    try {
      await apiPut(`/cuadros/${categoriaActiva}`, payload);
      setCuadrosCache(prev => ({ ...prev, [categoriaActiva]: payload }));
      setVista('cuadro');
      mostrarToast('Cuadro sorteado');
    } catch (e) { mostrarToast('No se pudo guardar el cuadro.'); }
  }

  async function sortearGrupos() {
    if (parejas.length % 4 !== 0 || parejas.length < 4) {
      const falta = 4 - (parejas.length % 4 || 4);
      mostrarToast(`Para grupos necesitás múltiplo de 4. Hoy hay ${parejas.length} (agregá o quitá ${falta === 4 ? 0 : falta}).`);
      return;
    }
    const resultado = generarGrupos(parejas);
    if (resultado.error) { mostrarToast(resultado.error); return; }
    const payload = { tipo: 'grupos', grupos: resultado.grupos, cuadroFinal: [] };
    try {
      await apiPut(`/cuadros/${categoriaActiva}`, payload);
      setCuadrosCache(prev => ({ ...prev, [categoriaActiva]: payload }));
      setVista('cuadro');
      mostrarToast('Grupos sorteados');
    } catch (e) { mostrarToast('No se pudo guardar los grupos.'); }
  }

  async function actualizarPartidoGrupo(grupoIdx, partidoIdx, cambios) {
    setCuadrosCache(prev => {
      const actual = prev[categoriaActiva] || { tipo: 'grupos', grupos: [], cuadroFinal: [] };
      const nuevosGrupos = actual.grupos.map((g, i) =>
        i === grupoIdx ? { ...g, partidos: g.partidos.map((p, j) => (j === partidoIdx ? { ...p, ...cambios } : p)) } : g
      );
      return { ...prev, [categoriaActiva]: { ...actual, grupos: nuevosGrupos } };
    });
    try {
      const fresco = await apiGet(`/cuadros/${categoriaActiva}`);
      const base = fresco.tipo === 'grupos' ? fresco : { tipo: 'grupos', grupos: [], cuadroFinal: [] };
      const nuevosGrupos = base.grupos.map((g, i) =>
        i === grupoIdx ? { ...g, partidos: g.partidos.map((p, j) => (j === partidoIdx ? { ...p, ...cambios } : p)) } : g
      );
      const payload = { tipo: 'grupos', grupos: nuevosGrupos, cuadroFinal: base.cuadroFinal || [] };
      setCuadrosCache(prev => ({ ...prev, [categoriaActiva]: payload }));
      await apiPut(`/cuadros/${categoriaActiva}`, payload);
    } catch (e) { mostrarToast('No se pudo guardar el resultado.'); }
  }

  async function armarCuadroFinalDesdeGrupos() {
    const todosCompletos = grupos.every(grupoCompleto);
    if (!todosCompletos) { mostrarToast('Todavía hay partidos de grupos sin resultado.'); return; }
    const cuadroFinal = generarCuadroDesdeGrupos(grupos);
    const payload = { tipo: 'grupos', grupos, cuadroFinal };
    try {
      await apiPut(`/cuadros/${categoriaActiva}`, payload);
      setCuadrosCache(prev => ({ ...prev, [categoriaActiva]: payload }));
      mostrarToast('Cuadro de clasificados armado');
    } catch (e) { mostrarToast('No se pudo armar el cuadro.'); }
  }

  async function actualizarPartido(rondaIdx, partidoIdx, cambios) {
    // Aplicamos el cambio optimista en pantalla de inmediato para que se sienta instantáneo
    setCuadrosCache(prev => {
      const actual = prev[categoriaActiva] || { tipo: 'eliminacion', rondas: [] };
      const cuadroOptimista = actual.rondas.map((r, i) =>
        i === rondaIdx ? { ...r, partidos: r.partidos.map((p, j) => (j === partidoIdx ? { ...p, ...cambios } : p)) } : r
      );
      return { ...prev, [categoriaActiva]: { tipo: 'eliminacion', rondas: propagarGanadores(cuadroOptimista) } };
    });
    try {
      // Traemos el cuadro más fresco posible del servidor para no pisar otro cambio reciente
      const fresco = await apiGet(`/cuadros/${categoriaActiva}`);
      const cuadroBase = fresco.rondas && fresco.rondas.length ? fresco.rondas : (cuadrosCache[categoriaActiva]?.rondas || []);
      const cuadroNuevo = cuadroBase.map((r, i) =>
        i === rondaIdx ? { ...r, partidos: r.partidos.map((p, j) => (j === partidoIdx ? { ...p, ...cambios } : p)) } : r
      );
      const propagado = propagarGanadores(cuadroNuevo);
      const payload = { tipo: 'eliminacion', rondas: propagado };
      setCuadrosCache(prev => ({ ...prev, [categoriaActiva]: payload }));
      await apiPut(`/cuadros/${categoriaActiva}`, payload);
    } catch (e) { mostrarToast('No se pudo guardar el cambio.'); }
  }

  async function ascenderPareja(pareja, categoriaDestino) {
    try {
      await apiPost(`/parejas/${pareja.id}/ascender`, { categoriaDestino });
      await cargarParejas();
      setCuadrosCache(prev => ({ ...prev, [categoriaActiva]: { tipo: 'eliminacion', rondas: [] } }));
      setModalAscenso(null);
      mostrarToast(`Ascendida a ${categoriaDestino}`);
    } catch (e) { mostrarToast('No se pudo ascender la pareja.'); }
  }

  const indexCategoria = CATEGORIAS.indexOf(categoriaActiva);
  const categoriaSuperior = indexCategoria < CATEGORIAS.length - 1 ? CATEGORIAS[indexCategoria + 1] : null;

  return (
    <div className="min-h-screen bg-[#0F1A14] text-[#E8E2D4]" style={{ fontFamily: "'Inter', system-ui, sans-serif" }}>
      <header className="border-b border-[#2A3B2E] sticky top-0 bg-[#0F1A14]/95 backdrop-blur z-20">
        <div className="px-4 py-4">
          <div className="flex items-center gap-2 mb-1">
            <div className={`w-2 h-2 rounded-full ${errorConexion ? 'bg-red-400' : 'bg-[#C8FF4D]'}`} />
            <span className="font-mono text-[10px] tracking-[0.25em] text-[#8FA88F] uppercase">
              {errorConexion ? 'Sin conexión al servidor' : 'Torneo en vivo'}
            </span>
          </div>
          <div className="flex items-center justify-between">
            <h1 className="font-display text-2xl leading-none tracking-tight">CUADRO&nbsp;DE&nbsp;PADEL</h1>
            <button onClick={() => setModalConfig(true)} title="Configurar canchas del club" className="flex items-center gap-1.5 text-[10px] font-mono text-[#8FA88F] hover:text-[#C8FF4D] uppercase border border-[#2A3B2E] rounded-full px-2.5 py-1">
              <Settings size={12} /> {cantidadCanchas} {cantidadCanchas === 1 ? 'cancha' : 'canchas'}
            </button>
          </div>
        </div>
        <div className="flex overflow-x-auto px-4 pb-3 gap-1.5">
          {CATEGORIAS.map(cat => {
            const count = (parejasPorCategoria[cat] || []).length;
            const activo = cat === categoriaActiva;
            return (
              <button key={cat} onClick={() => { setCategoriaActiva(cat); setVista('participantes'); }}
                className={`shrink-0 px-3 py-1.5 rounded-full text-sm font-semibold transition-colors border ${activo ? 'bg-[#C8FF4D] text-[#0F1A14] border-[#C8FF4D]' : 'bg-transparent text-[#8FA88F] border-[#2A3B2E]'}`}>
                {cat}{count > 0 && <span className="ml-1.5 opacity-70 font-mono text-xs">{count}</span>}
              </button>
            );
          })}
        </div>
      </header>

      <div className="flex px-4 pt-3 gap-4 border-b border-[#2A3B2E]">
        {[{ id: 'participantes', label: 'Participantes', icon: Users }, { id: 'cuadro', label: esGrupos ? 'Grupos' : 'Cuadro', icon: Trophy }].map(t => (
          <button key={t.id} onClick={() => setVista(t.id)}
            className={`flex items-center gap-1.5 pb-2.5 text-sm font-medium border-b-2 transition-colors ${vista === t.id ? 'border-[#C8FF4D] text-[#E8E2D4]' : 'border-transparent text-[#5C6E5E]'}`}>
            <t.icon size={14} />{t.label}
          </button>
        ))}
      </div>

      <main className="px-4 py-5 max-w-2xl mx-auto">
        {vista === 'participantes' && (
          <ParticipantesView
            categoriaActiva={categoriaActiva} parejas={parejas}
            jugador1={jugador1} setJugador1={setJugador1}
            jugador2={jugador2} setJugador2={setJugador2}
            horarioPref={horarioPref} setHorarioPref={setHorarioPref}
            agregarPareja={agregarPareja} eliminarPareja={eliminarPareja}
            sortearCuadro={sortearCuadro} sortearGrupos={sortearGrupos} categoriaSuperior={categoriaSuperior}
            abrirAscenso={(p) => setModalAscenso(p)} tieneCuadro={cuadro.length > 0 || grupos.length > 0}
          />
        )}
        {vista === 'cuadro' && !esGrupos && (
          <CuadroView cuadro={cuadro} categoriaActiva={categoriaActiva} cantidadCanchas={cantidadCanchas}
            actualizarPartido={actualizarPartido} sortearCuadro={sortearCuadro} />
        )}
        {vista === 'cuadro' && esGrupos && (
          <GruposView grupos={grupos} cuadroFinal={cuadro} categoriaActiva={categoriaActiva} cantidadCanchas={cantidadCanchas}
            actualizarPartidoGrupo={actualizarPartidoGrupo}
            armarCuadroFinalDesdeGrupos={armarCuadroFinalDesdeGrupos}
            actualizarPartido={actualizarPartido} />
        )}
      </main>

      {modalAscenso && (
        <ModalAscenso pareja={modalAscenso} categoriaActual={categoriaActiva} categoriaSuperior={categoriaSuperior}
          onConfirmar={(destino) => ascenderPareja(modalAscenso, destino)} onCerrar={() => setModalAscenso(null)} />
      )}

      {modalConfig && (
        <ModalConfigCanchas cantidadActual={cantidadCanchas}
          onConfirmar={(n) => { guardarCantidadCanchas(n); setModalConfig(false); }}
          onCerrar={() => setModalConfig(false)} />
      )}

      {toast && (
        <div className="fixed bottom-5 left-1/2 -translate-x-1/2 bg-[#C8FF4D] text-[#0F1A14] text-sm font-semibold px-4 py-2 rounded-full shadow-lg z-50">
          {toast}
        </div>
      )}
    </div>
  );
}

function ParticipantesView({ categoriaActiva, parejas, jugador1, setJugador1, jugador2, setJugador2, horarioPref, setHorarioPref, agregarPareja, eliminarPareja, sortearCuadro, sortearGrupos, categoriaSuperior, abrirAscenso, tieneCuadro }) {
  const multiploDeCuatro = parejas.length >= 4 && parejas.length % 4 === 0;
  return (
    <div className="space-y-5">
      <div className="bg-[#152319] border border-[#2A3B2E] rounded-2xl p-4">
        <div className="text-xs font-mono tracking-widest text-[#8FA88F] uppercase mb-3">Agregar pareja · {categoriaActiva}</div>
        <div className="space-y-2.5">
          <input value={jugador1} onChange={e => setJugador1(e.target.value)} placeholder="Nombre y apellido — jugador/a 1"
            className="w-full bg-[#0F1A14] border border-[#2A3B2E] rounded-xl px-3.5 py-2.5 text-sm placeholder:text-[#5C6E5E] focus:outline-none focus:border-[#C8FF4D]" />
          <input value={jugador2} onChange={e => setJugador2(e.target.value)} placeholder="Nombre y apellido — jugador/a 2 (opcional)"
            className="w-full bg-[#0F1A14] border border-[#2A3B2E] rounded-xl px-3.5 py-2.5 text-sm placeholder:text-[#5C6E5E] focus:outline-none focus:border-[#C8FF4D]" />
          <input value={horarioPref} onChange={e => setHorarioPref(e.target.value)} placeholder="Horario u observación (opcional)"
            className="w-full bg-[#0F1A14] border border-[#2A3B2E] rounded-xl px-3.5 py-2.5 text-sm placeholder:text-[#5C6E5E] focus:outline-none focus:border-[#C8FF4D]" />
          <button onClick={agregarPareja} className="w-full flex items-center justify-center gap-1.5 bg-[#C8FF4D] text-[#0F1A14] font-semibold rounded-xl py-2.5 text-sm active:scale-[0.98] transition-transform">
            <Plus size={16} /> Agregar
          </button>
        </div>
      </div>

      <div>
        <div className="flex items-center justify-between mb-2.5">
          <span className="text-xs font-mono tracking-widest text-[#8FA88F] uppercase">Anotados ({parejas.length})</span>
          <div className="flex items-center gap-3">
            {tieneCuadro && <span className="text-[10px] font-mono text-[#C8FF4D]/70 uppercase">Sorteado</span>}
            {parejas.length > 0 && (
              <button onClick={() => descargarPdfParticipantes(categoriaActiva, parejas)} title="Descargar lista en PDF" className="flex items-center gap-1 text-[10px] font-mono text-[#8FA88F] hover:text-[#C8FF4D] uppercase">
                <Download size={12} /> PDF
              </button>
            )}
          </div>
        </div>
        {parejas.length === 0 ? (
          <div className="text-center py-10 text-[#5C6E5E] text-sm border border-dashed border-[#2A3B2E] rounded-2xl">
            Todavía no hay parejas en {categoriaActiva}.<br />Agregá la primera arriba.
          </div>
        ) : (
          <div className="space-y-2">
            {parejas.map((p, idx) => (
              <div key={p.id} className="flex items-center gap-3 bg-[#152319] border border-[#2A3B2E] rounded-xl px-3.5 py-3">
                <span className="font-mono text-xs text-[#5C6E5E] w-5 shrink-0">{String(idx + 1).padStart(2, '0')}</span>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium truncate">{p.nombre1}{p.nombre2 ? ` / ${p.nombre2}` : ''}</div>
                  {p.horario && <div className="flex items-center gap-1 text-[11px] text-[#8FA88F] mt-0.5"><Clock size={10} /> {p.horario}</div>}
                </div>
                {categoriaSuperior && (
                  <button onClick={() => abrirAscenso(p)} title={`Ascender a ${categoriaSuperior}`} className="text-[#8FA88F] hover:text-[#C8FF4D] p-1.5 shrink-0">
                    <ArrowUpCircle size={18} />
                  </button>
                )}
                <button onClick={() => eliminarPareja(p.id)} className="text-[#5C6E5E] hover:text-red-400 p-1.5 shrink-0"><Trash2 size={16} /></button>
              </div>
            ))}
          </div>
        )}
      </div>

      {parejas.length >= 2 && (
        <div className="space-y-2">
          <div className="text-xs font-mono tracking-widest text-[#8FA88F] uppercase">{tieneCuadro ? 'Volver a sortear' : 'Elegir formato y sortear'}</div>
          <button onClick={sortearCuadro} className="w-full flex items-center justify-center gap-2 bg-[#152319] border border-[#C8FF4D]/40 text-[#C8FF4D] font-semibold rounded-xl py-3 text-sm active:scale-[0.98] transition-transform">
            <Shuffle size={16} /> Eliminación directa
          </button>
          <button onClick={sortearGrupos} className="w-full flex items-center justify-center gap-2 bg-[#152319] border border-[#C8FF4D]/40 text-[#C8FF4D] font-semibold rounded-xl py-3 text-sm active:scale-[0.98] transition-transform">
            <Users size={16} /> Fase de grupos (4 en 4)
          </button>
          {!multiploDeCuatro && (
            <div className="text-[11px] text-[#8FA88F] text-center px-2">
              Fase de grupos necesita múltiplo de 4 parejas. Hoy hay {parejas.length}.
            </div>
          )}
        </div>
      )}
    </div>
  );
}

        <div className="flex items-center gap-3 bg-gradient-to-r from-[#C8FF4D]/15 to-transparent border border-[#C8FF4D]/30 rounded-2xl px-4 py-3.5">

            <div className="text-[10px] font-mono tracking-widest text-[#C8FF4D]/80 uppercase">Campeón {categoriaActiva}</div>

        <Shuffle size={14} /> Volver a sortear desde cero
      </button>

}

function GruposView({ grupos, cuadroFinal, categoriaActiva, cantidadCanchas, actualizarPartidoGrupo, armarCuadroFinalDesdeGrupos, actualizarPartido }) {
  if (!grupos || grupos.length === 0) {
    return (
      <div className="text-center py-16 text-[#5C6E5E] text-sm">
        <Users className="mx-auto mb-3 text-[#2A3B2E]" size={32} />
        Todavía no sorteaste los grupos de {categoriaActiva}.
      </div>
    );
  }

  // Si ya se armó el cuadro de clasificados, mostramos eso debajo de los grupos
  const todosCompletos = grupos.every(grupoCompleto);
  const hayClasificados = cuadroFinal && cuadroFinal.length > 0;
  const campeon = hayClasificados ? cuadroFinal[cuadroFinal.length - 1]?.partidos?.[0]?.ganador : null;

  return (
    <div className="space-y-6 overflow-x-auto pb-4">
      <button onClick={() => descargarPdfGrupos(categoriaActiva, grupos)} className="w-full flex items-center justify-center gap-2 bg-[#152319] border border-[#C8FF4D]/40 text-[#C8FF4D] font-semibold rounded-xl py-2.5 text-sm active:scale-[0.98] transition-transform">
        <Download size={16} /> Descargar partidos de grupos en PDF
      </button>

      {grupos.map((grupo, gIdx) => {
        const tabla = calcularTablaGrupo(grupo);
        return (
          <div key={grupo.id}>
            <div className="text-xs font-mono tracking-widest text-[#8FA88F] uppercase mb-2.5 flex items-center gap-2">
              <span className="w-1.5 h-1.5 rounded-full bg-[#C8FF4D]" />{grupo.nombre}
            </div>

            {/* Tabla de posiciones */}
            <div className="bg-[#152319] border border-[#2A3B2E] rounded-xl overflow-hidden mb-2.5">
              <table className="w-full text-xs">
                <thead>
                  <tr className="text-[#5C6E5E] border-b border-[#2A3B2E]">
                    <th className="text-left py-2 px-3 font-mono">Pareja</th>
                    <th className="text-center py-2 px-2 font-mono">PJ</th>
                    <th className="text-center py-2 px-2 font-mono">PG</th>
                    <th className="text-center py-2 px-2 font-mono">DIF</th>
                  </tr>
                </thead>
                <tbody>
                  {tabla.map((fila, idx) => (
                    <tr key={fila.pareja.id} className={idx < 2 ? 'text-[#C8FF4D]' : 'text-[#E8E2D4]'}>
                      <td className="py-2 px-3 truncate max-w-[140px]">{nombrePareja(fila.pareja)}</td>
                      <td className="text-center py-2 px-2 font-mono">{fila.jugados}</td>
                      <td className="text-center py-2 px-2 font-mono">{fila.victorias}</td>
                      <td className="text-center py-2 px-2 font-mono">{fila.diferencia > 0 ? '+' : ''}{fila.diferencia}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {/* Partidos del grupo */}
            <div className="space-y-2.5">
              {grupo.partidos.map((partido, pIdx) => (
                <PartidoGrupoCard key={partido.id} partido={partido} cantidadCanchas={cantidadCanchas} onChange={(cambios) => actualizarPartidoGrupo(gIdx, pIdx, cambios)} />
              ))}
            </div>
          </div>
        );
      })}

      {!hayClasificados && (
        <button onClick={armarCuadroFinalDesdeGrupos} disabled={!todosCompletos}
          className={`w-full flex items-center justify-center gap-2 rounded-xl py-3 text-sm font-semibold transition-transform ${todosCompletos ? 'bg-[#C8FF4D] text-[#0F1A14] active:scale-[0.98]' : 'bg-[#152319] border border-[#2A3B2E] text-[#5C6E5E]'}`}>
          <Trophy size={16} /> {todosCompletos ? 'Armar cuadro de clasificados' : 'Completá todos los partidos de grupos'}
        </button>
      )}

      {hayClasificados && (
        <div className="pt-2 space-y-6">
          <div className="text-xs font-mono tracking-widest text-[#C8FF4D] uppercase mb-2.5 flex items-center gap-2 border-t border-[#2A3B2E] pt-5">
            <Trophy size={14} /> Cuadro de clasificados
          </div>
          <button onClick={() => descargarPdfCuadro(categoriaActiva, cuadroFinal)} className="w-full flex items-center justify-center gap-2 bg-[#152319] border border-[#C8FF4D]/40 text-[#C8FF4D] font-semibold rounded-xl py-2.5 text-sm active:scale-[0.98] transition-transform">
            <Download size={16} /> Descargar cuadro de clasificados en PDF
          </button>
          {campeon && (
            <div className="flex items-center gap-3 bg-gradient-to-r from-[#C8FF4D]/15 to-transparent border border-[#C8FF4D]/30 rounded-2xl px-4 py-3.5">
              <Trophy size={22} className="text-[#C8FF4D] shrink-0" />
              <div>
                <div className="text-[10px] font-mono tracking-widest text-[#C8FF4D]/80 uppercase">Campeón {categoriaActiva}</div>
                <div className="font-semibold text-sm">{nombrePareja(campeon)}</div>
              </div>
            </div>
          )}
          {cuadroFinal.map((ronda, rIdx) => (
            <div key={rIdx}>
              <div className="text-xs font-mono tracking-widest text-[#8FA88F] uppercase mb-2.5 flex items-center gap-2">
                <span className="w-1.5 h-1.5 rounded-full bg-[#C8FF4D]" />{ronda.nombre}
              </div>
              <div className="space-y-2.5">
                {ronda.partidos.map((partido, pIdx) => (
                  <PartidoCard key={partido.id} partido={partido} cantidadCanchas={cantidadCanchas} onChange={(cambios) => actualizarPartido(rIdx, pIdx, cambios)} />
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function PartidoGrupoCard({ partido, cantidadCanchas, onChange }) {
  const { parejaA, parejaB, horario, cancha, sets } = partido;
  const [editando, setEditando] = useState(false);
  const setsActuales = sets && sets.length === 3 ? sets : [{ a: '', b: '' }, { a: '', b: '' }, { a: '', b: '' }];
  const [tmpSets, setTmpSets] = useState(setsActuales.map(s => ({ a: s.a != null ? String(s.a) : '', b: s.b != null ? String(s.b) : '' })));
  const opcionesCancha = Array.from({ length: cantidadCanchas || 1 }, (_, i) => i + 1);

  function guardarResultado() {
    const setsLimpios = tmpSets.map(s => ({
      a: s.a === '' ? '' : parseInt(s.a, 10),
      b: s.b === '' ? '' : parseInt(s.b, 10),
    }));
    onChange({ sets: setsLimpios });
    setEditando(false);
  }

  const resultado = calcularResultadoSets(setsActuales);
  const hayResultado = resultado.jugados > 0;
  const ganoA = resultado.ganador === 'A';
  const ganoB = resultado.ganador === 'B';
  const setsJugados = setsActuales.filter(s => s.a !== '' && s.b !== '' && s.a != null && s.b != null);

  return (
    <div className="bg-[#152319] border border-[#2A3B2E] rounded-xl overflow-hidden">
      <div className="flex items-center gap-2 px-3.5 pt-2.5 pb-1">
        <input value={horario} onChange={e => onChange({ horario: e.target.value })} placeholder="Horario"
          className="bg-transparent text-[11px] font-mono text-[#8FA88F] placeholder:text-[#3D4F40] focus:outline-none focus:text-[#E8E2D4] w-20" />
        <span className="text-[#2A3B2E]">·</span>
        <select value={cancha || ''} onChange={e => onChange({ cancha: e.target.value })}
          className="bg-transparent text-[11px] font-mono text-[#8FA88F] focus:outline-none focus:text-[#E8E2D4]">
          <option value="" className="bg-[#152319]">Cancha</option>
          {opcionesCancha.map(n => (
            <option key={n} value={n} className="bg-[#152319]">Cancha {n}</option>
          ))}
        </select>
      </div>
      <div className="px-3.5 pb-3 space-y-1">
        <div className={`flex items-center justify-between px-2.5 py-2 rounded-lg text-sm ${ganoA ? 'bg-[#C8FF4D]/15 text-[#C8FF4D] font-semibold' : 'text-[#E8E2D4]'}`}>
          <span className="truncate">{nombrePareja(parejaA)}</span>
          {hayResultado && (
            <span className="font-mono text-xs flex gap-1.5 shrink-0 ml-2">
              {setsJugados.map((s, i) => <span key={i}>{s.a}</span>)}
            </span>
          )}
        </div>
        <div className="flex items-center gap-2">
          <div className="flex-1 h-px bg-[#2A3B2E]" /><span className="text-[9px] font-mono text-[#3D4F40]">VS</span><div className="flex-1 h-px bg-[#2A3B2E]" />
        </div>
        <div className={`flex items-center justify-between px-2.5 py-2 rounded-lg text-sm ${ganoB ? 'bg-[#C8FF4D]/15 text-[#C8FF4D] font-semibold' : 'text-[#E8E2D4]'}`}>
          <span className="truncate">{nombrePareja(parejaB)}</span>
          {hayResultado && (
            <span className="font-mono text-xs flex gap-1.5 shrink-0 ml-2">
              {setsJugados.map((s, i) => <span key={i}>{s.b}</span>)}
            </span>
          )}
        </div>
      </div>
      <div className="border-t border-[#2A3B2E] px-3.5 py-2">
        {editando ? (
          <div className="space-y-2">
            {[0, 1, 2].map(i => (
              <div key={i} className="flex items-center gap-2">
                <span className="text-[10px] font-mono text-[#5C6E5E] w-12 shrink-0">Set {i + 1}{i === 2 ? ' (op.)' : ''}</span>
                <input type="number" min="0" value={tmpSets[i].a}
                  onChange={e => setTmpSets(prev => prev.map((s, idx) => idx === i ? { ...s, a: e.target.value } : s))}
                  placeholder="—" className="w-14 bg-[#0F1A14] border border-[#2A3B2E] rounded-lg px-2 py-1.5 text-xs font-mono text-center focus:outline-none focus:border-[#C8FF4D]" />
                <span className="text-[#5C6E5E] text-xs">-</span>
                <input type="number" min="0" value={tmpSets[i].b}
                  onChange={e => setTmpSets(prev => prev.map((s, idx) => idx === i ? { ...s, b: e.target.value } : s))}
                  placeholder="—" className="w-14 bg-[#0F1A14] border border-[#2A3B2E] rounded-lg px-2 py-1.5 text-xs font-mono text-center focus:outline-none focus:border-[#C8FF4D]" />
              </div>
            ))}
            <button onClick={guardarResultado} className="w-full bg-[#C8FF4D] text-[#0F1A14] rounded-lg py-2 text-xs font-semibold flex items-center justify-center gap-1.5">
              <Check size={14} /> Guardar resultado
            </button>
          </div>
        ) : (
          <button onClick={() => setEditando(true)} className="text-[11px] font-mono text-[#5C6E5E] hover:text-[#8FA88F]">
            {hayResultado ? `Resultado: ${setsJugados.map(s => `${s.a}-${s.b}`).join('  /  ')}` : '+ Cargar resultado (hasta 3 sets)'}
          </button>
        )}
      </div>
    </div>
  );
}


function PartidoCard({ partido, cantidadCanchas, onChange }) {
  const { parejaA, parejaB, ganador, horario, cancha, marcador } = partido;
  const esByeA = parejaA && !parejaB;
  const esByeB = parejaB && !parejaA;
  const ambasDefinidas = parejaA && parejaB;
  const [editando, setEditando] = useState(false);
  const [marcadorTmp, setMarcadorTmp] = useState(marcador || '');

  function elegirGanador(p) { onChange({ ganador: p }); }
  const ganadorId = ganador ? ganador.id : null;
  const opcionesCancha = Array.from({ length: cantidadCanchas || 1 }, (_, i) => i + 1);

  return (
    <div className="bg-[#152319] border border-[#2A3B2E] rounded-xl overflow-hidden">
      <div className="flex items-center gap-2 px-3.5 pt-2.5 pb-1">
        <input value={horario} onChange={e => onChange({ horario: e.target.value })} placeholder="Horario"
          className="bg-transparent text-[11px] font-mono text-[#8FA88F] placeholder:text-[#3D4F40] focus:outline-none focus:text-[#E8E2D4] w-20" />
        <span className="text-[#2A3B2E]">·</span>
        <select value={cancha || ''} onChange={e => onChange({ cancha: e.target.value })}
          className="bg-transparent text-[11px] font-mono text-[#8FA88F] focus:outline-none focus:text-[#E8E2D4]">
          <option value="" className="bg-[#152319]">Cancha</option>
          {opcionesCancha.map(n => (
            <option key={n} value={n} className="bg-[#152319]">Cancha {n}</option>
          ))}
        </select>
      </div>
      <div className="px-3.5 pb-3 space-y-1">
        <FilaPareja pareja={parejaA} esGanador={ganadorId === (parejaA && parejaA.id)} esBye={esByeA} puedeElegir={ambasDefinidas} onElegir={() => elegirGanador(parejaA)} />
        <div className="flex items-center gap-2">
          <div className="flex-1 h-px bg-[#2A3B2E]" /><span className="text-[9px] font-mono text-[#3D4F40]">VS</span><div className="flex-1 h-px bg-[#2A3B2E]" />
        </div>
        <FilaPareja pareja={parejaB} esGanador={ganadorId === (parejaB && parejaB.id)} esBye={esByeB} puedeElegir={ambasDefinidas} onElegir={() => elegirGanador(parejaB)} />
      </div>
      {ambasDefinidas && (
        <div className="border-t border-[#2A3B2E] px-3.5 py-2">
          {editando ? (
            <div className="flex gap-2">
              <input autoFocus value={marcadorTmp} onChange={e => setMarcadorTmp(e.target.value)} placeholder="Ej: 6-3 / 6-4"
                className="flex-1 bg-[#0F1A14] border border-[#2A3B2E] rounded-lg px-2.5 py-1.5 text-xs font-mono focus:outline-none focus:border-[#C8FF4D]" />
              <button onClick={() => { onChange({ marcador: marcadorTmp }); setEditando(false); }} className="bg-[#C8FF4D] text-[#0F1A14] rounded-lg px-3 text-xs font-semibold">
                <Check size={14} />
              </button>
            </div>
          ) : (
            <button onClick={() => setEditando(true)} className="text-[11px] font-mono text-[#5C6E5E] hover:text-[#8FA88F]">
              {marcador ? `Resultado: ${marcador}` : '+ Cargar resultado'}
            </button>
          )}
        </div>
      )}
    </div>
  );
}

function FilaPareja({ pareja, esGanador, esBye, puedeElegir, onElegir }) {
  if (!pareja) return <div className="flex items-center px-2.5 py-2 rounded-lg text-[#3D4F40] text-sm italic">— por definir —</div>;
  return (
    <button onClick={puedeElegir ? onElegir : undefined} disabled={!puedeElegir}
      className={`w-full flex items-center justify-between px-2.5 py-2 rounded-lg text-sm transition-colors ${esGanador ? 'bg-[#C8FF4D]/15 text-[#C8FF4D] font-semibold' : puedeElegir ? 'text-[#E8E2D4] hover:bg-[#1C2B20]' : 'text-[#E8E2D4]'}`}>
      <span className="truncate text-left">{nombrePareja(pareja)}</span>
      {esBye && <span className="text-[9px] font-mono text-[#5C6E5E] shrink-0 ml-2">BYE</span>}
      {esGanador && !esBye && <ChevronRight size={14} className="shrink-0 ml-2" />}
    </button>
  );
}

function ModalAscenso({ pareja, categoriaActual, categoriaSuperior, onConfirmar, onCerrar }) {
  return (
    <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50" onClick={onCerrar}>
      <div onClick={e => e.stopPropagation()} className="bg-[#152319] border border-[#2A3B2E] rounded-2xl p-5 w-full max-w-sm">
        <div className="flex items-start justify-between mb-3">
          <div className="flex items-center gap-2">
            <ArrowUpCircle size={18} className="text-[#C8FF4D]" />
            <span className="font-display text-sm">ASCENSO DE CATEGORÍA</span>
          </div>
          <button onClick={onCerrar} className="text-[#5C6E5E]"><X size={18} /></button>
        </div>
        <p className="text-sm text-[#8FA88F] mb-1">{pareja.nombre1}{pareja.nombre2 ? ` / ${pareja.nombre2}` : ''}</p>
        <p className="text-xs text-[#5C6E5E] mb-4">
          Pasa de <span className="text-[#E8E2D4]">{categoriaActual}</span> a <span className="text-[#C8FF4D]">{categoriaSuperior}</span>. Se quita del cuadro actual de {categoriaActual}.
        </p>
        <div className="flex gap-2">
          <button onClick={onCerrar} className="flex-1 border border-[#2A3B2E] text-[#8FA88F] rounded-xl py-2.5 text-sm font-medium">Cancelar</button>
          <button onClick={() => onConfirmar(categoriaSuperior)} className="flex-1 bg-[#C8FF4D] text-[#0F1A14] rounded-xl py-2.5 text-sm font-semibold">Confirmar</button>
        </div>
      </div>
    </div>
  );
}

function ModalConfigCanchas({ cantidadActual, onConfirmar, onCerrar }) {
  const [seleccion, setSeleccion] = useState(cantidadActual);
  return (
    <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50" onClick={onCerrar}>
      <div onClick={e => e.stopPropagation()} className="bg-[#152319] border border-[#2A3B2E] rounded-2xl p-5 w-full max-w-sm">
        <div className="flex items-start justify-between mb-3">
          <div className="flex items-center gap-2">
            <Settings size={18} className="text-[#C8FF4D]" />
            <span className="font-display text-sm">CANCHAS DEL CLUB</span>
          </div>
          <button onClick={onCerrar} className="text-[#5C6E5E]"><X size={18} /></button>
        </div>
        <p className="text-xs text-[#5C6E5E] mb-4">
          Elegí cuántas canchas tiene el club. Esto define las opciones disponibles al asignar cancha a cada partido.
        </p>
        <div className="flex gap-2 mb-5">
          {[1, 2, 3, 4, 5].map(n => (
            <button key={n} onClick={() => setSeleccion(n)}
              className={`flex-1 py-3 rounded-xl text-sm font-semibold border transition-colors ${seleccion === n ? 'bg-[#C8FF4D] text-[#0F1A14] border-[#C8FF4D]' : 'bg-[#0F1A14] text-[#8FA88F] border-[#2A3B2E]'}`}>
              {n}
            </button>
          ))}
        </div>
        <div className="flex gap-2">
          <button onClick={onCerrar} className="flex-1 border border-[#2A3B2E] text-[#8FA88F] rounded-xl py-2.5 text-sm font-medium">Cancelar</button>
          <button onClick={() => onConfirmar(seleccion)} className="flex-1 bg-[#C8FF4D] text-[#0F1A14] rounded-xl py-2.5 text-sm font-semibold">Guardar</button>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<TorneoPadel />);
</script>
</body>
</html>
